<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เครื่องแปลงฐาน ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a237e;
    --ink-light: #3949ab;
    --paper: #f8f9ff;
    --line: #c5cae9;
    --accent: #e91e8c;
    --accent2: #00bcd4;
    --accent3: #ff9800;
    --card: #ffffff;
    --shadow: rgba(57,73,171,0.12);
    --grid: rgba(197,202,233,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--paper);
    min-height: 100vh;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 28px 28px;
  }

  header {
    background: linear-gradient(135deg, #1a237e 0%, #3949ab 60%, #5c6bc0 100%);
    color: white;
    padding: 28px 20px 22px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(26,35,126,0.3);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 28px 28px;
  }
  header h1 {
    font-family: 'Caveat', cursive;
    font-size: 2.6rem;
    font-weight: 700;
    letter-spacing: 1px;
    position: relative;
  }
  header p {
    font-size: 0.95rem;
    opacity: 0.85;
    margin-top: 4px;
    position: relative;
  }
  .header-deco {
    position: absolute;
    font-size: 1.8rem;
    opacity: 0.2;
  }
  .header-deco:nth-child(1) { top: 10px; left: 20px; transform: rotate(-15deg); }
  .header-deco:nth-child(2) { bottom: 8px; right: 30px; transform: rotate(10deg); }
  .header-deco:nth-child(3) { top: 15px; right: 80px; transform: rotate(-5deg); }

  .tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 20px 16px 0;
    flex-wrap: wrap;
  }
  .tab-btn {
    padding: 10px 22px;
    border: 2.5px solid var(--ink-light);
    background: white;
    color: var(--ink-light);
    border-radius: 50px;
    font-family: 'Sarabun', sans-serif;
    font-size: 0.92rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn:hover { background: #e8eaf6; }
  .tab-btn.active {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
    box-shadow: 0 4px 12px var(--shadow);
  }

  .container { max-width: 760px; margin: 0 auto; padding: 20px 16px 60px; }

  .panel { display: none; }
  .panel.active { display: block; }

  /* Cards */
  .card {
    background: var(--card);
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 4px 20px var(--shadow);
    margin-bottom: 20px;
    border: 1.5px solid var(--line);
  }
  .card-title {
    font-family: 'Caveat', cursive;
    font-size: 1.4rem;
    color: var(--ink);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Input group */
  .input-group { margin-bottom: 16px; }
  .input-group label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .input-row { display: flex; gap: 10px; align-items: stretch; flex-wrap: wrap; }
  .input-row input, .input-row select {
    flex: 1;
    min-width: 100px;
    padding: 12px 16px;
    border: 2px solid var(--line);
    border-radius: 12px;
    font-size: 1.1rem;
    font-family: 'Caveat', cursive;
    color: var(--ink);
    background: #f0f4ff;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .input-row input:focus, .input-row select:focus {
    border-color: var(--ink-light);
    background: white;
  }
  .base-select {
    padding: 12px 14px;
    border: 2px solid var(--line);
    border-radius: 12px;
    font-size: 1rem;
    font-family: 'Sarabun', sans-serif;
    color: var(--ink);
    background: #f0f4ff;
    cursor: pointer;
    outline: none;
    min-width: 120px;
    transition: border-color 0.2s;
  }
  .base-select:focus { border-color: var(--ink-light); background: white; }

  .arrow-mid {
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 1.5rem;
    color: var(--accent2);
    margin: 4px 0;
    font-family: 'Caveat', cursive;
    font-weight: 700;
  }

  /* Convert button */
  .btn-convert {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #1a237e, #5c6bc0);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 1.1rem;
    font-family: 'Sarabun', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(26,35,126,0.3);
    margin-top: 4px;
  }
  .btn-convert:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,35,126,0.35); }
  .btn-convert:active { transform: none; }

  /* Quick base badges */
  .quick-bases {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .base-badge {
    padding: 5px 12px;
    border-radius: 50px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid;
    transition: all 0.15s;
    font-family: 'Sarabun', sans-serif;
  }
  .base-badge:hover { transform: scale(1.05); }
  .bb-2  { color: #e91e8c; border-color: #e91e8c; }  .bb-2.sel  { background: #e91e8c; color: white; }
  .bb-8  { color: #ff9800; border-color: #ff9800; }  .bb-8.sel  { background: #ff9800; color: white; }
  .bb-10 { color: #4caf50; border-color: #4caf50; }  .bb-10.sel { background: #4caf50; color: white; }
  .bb-16 { color: #3949ab; border-color: #3949ab; }  .bb-16.sel { background: #3949ab; color: white; }

  /* Result area */
  .result-box {
    background: #e8eaf6;
    border-radius: 16px;
    padding: 20px;
    margin-top: 16px;
    border: 2px solid var(--line);
    display: none;
  }
  .result-box.show { display: block; animation: popIn 0.3s ease; }
  @keyframes popIn {
    from { transform: scale(0.96); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }
  .result-answer {
    text-align: center;
    font-family: 'Caveat', cursive;
    font-size: 1.8rem;
    color: var(--ink);
    padding: 12px 0 4px;
    border-bottom: 2.5px dashed var(--line);
    margin-bottom: 14px;
  }
  .result-answer span { color: var(--accent); font-size: 2.1rem; }

  /* Long division display */
  .division-title {
    font-family: 'Caveat', cursive;
    font-size: 1.05rem;
    color: var(--ink-light);
    margin-bottom: 12px;
    text-align: center;
  }
  .division-steps {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    font-family: 'Caveat', cursive;
    font-size: 1.25rem;
    color: var(--ink);
  }
  .div-step {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 0;
    opacity: 0;
    transform: translateX(-10px);
    animation: slideIn 0.3s ease forwards;
  }
  @keyframes slideIn {
    to { opacity: 1; transform: none; }
  }
  .div-step .divisor {
    min-width: 30px;
    text-align: right;
    color: #7986cb;
  }
  .div-step .bracket {
    font-size: 1.4rem;
    line-height: 1;
    color: var(--ink);
  }
  .div-step .dividend {
    min-width: 70px;
    text-align: left;
    padding-left: 4px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 1px;
  }
  .div-step .quotient {
    min-width: 60px;
    text-align: right;
    color: var(--ink-light);
    font-weight: 700;
  }
  .div-step .rem-label {
    font-size: 0.9rem;
    color: #888;
  }
  .div-step .rem-val {
    min-width: 30px;
    text-align: left;
    color: var(--accent);
    font-weight: 700;
  }

  .final-answer-line {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 2.5px solid var(--ink);
    text-align: center;
    font-family: 'Caveat', cursive;
    font-size: 1.5rem;
    color: var(--ink);
    letter-spacing: 1px;
  }
  .final-answer-line .res-from { color: #7986cb; font-size: 1rem; vertical-align: super; }
  .final-answer-line .res-to   { color: var(--accent); font-size: 1rem; vertical-align: super; }

  /* All bases table */
  .all-bases-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
    margin-top: 14px;
  }
  .base-chip {
    background: white;
    border: 2px solid var(--line);
    border-radius: 12px;
    padding: 10px 12px;
    text-align: center;
    opacity: 0;
    animation: popIn 0.3s ease forwards;
  }
  .base-chip .bc-label {
    font-size: 0.72rem;
    font-weight: 600;
    color: #888;
    margin-bottom: 4px;
  }
  .base-chip .bc-val {
    font-family: 'Caveat', cursive;
    font-size: 1.3rem;
    color: var(--ink);
    font-weight: 700;
    word-break: break-all;
  }

  /* Error */
  .error-msg {
    background: #fce4ec;
    color: #c62828;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.9rem;
    margin-top: 10px;
    display: none;
    font-weight: 500;
  }
  .error-msg.show { display: block; animation: shake 0.3s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }

  /* Base-to-base panel */
  .b2b-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .b2b-row input { flex: 2; min-width: 140px; }
  .b2b-row .base-select { flex: 1; }
  .b2b-arrow { font-size: 1.6rem; color: var(--accent2); padding: 0 4px; }

  .note { font-size: 0.78rem; color: #999; margin-top: 6px; }

  /* Responsive */
  @media(max-width: 480px) {
    header h1 { font-size: 2rem; }
    .div-step { font-size: 1.05rem; }
    .result-answer { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-deco">📐</div>
  <div class="header-deco">✏️</div>
  <div class="header-deco">🔢</div>
  <h1>🔢 เครื่องแปลงฐาน</h1>
  <p>แปลงเลขฐานต่างๆ พร้อมแสดงวิธีหาร ✨</p>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('dec2any')">🔄 เลขฐาน 10 → ฐานอื่น</button>
  <button class="tab-btn" onclick="switchTab('any2any')">↔️ ฐานใดก็ได้</button>
  <button class="tab-btn" onclick="switchTab('allbases')">📋 แสดงทุกฐาน</button>
</div>

<div class="container">

  <!-- Panel 1: Decimal to any base -->
  <div class="panel active" id="panel-dec2any">
    <div class="card">
      <div class="card-title">🖊️ แปลงเลขฐาน 10 เป็นฐานที่ต้องการ</div>

      <div class="input-group">
        <label>ป้อนเลขฐาน 10</label>
        <div class="input-row">
          <input type="text" id="d2a-input" placeholder="เช่น 45017" oninput="clearResult('d2a')">
        </div>
      </div>

      <div class="input-group">
        <label>เลือกฐานปลายทาง</label>
        <div class="quick-bases" id="d2a-bases">
          <span class="base-badge bb-2"  onclick="pickBase('d2a',2)">ฐาน 2</span>
          <span class="base-badge bb-8"  onclick="pickBase('d2a',8)">ฐาน 8</span>
          <span class="base-badge bb-10" onclick="pickBase('d2a',10)">ฐาน 10</span>
          <span class="base-badge bb-16" onclick="pickBase('d2a',16)">ฐาน 16</span>
        </div>
        <div class="input-row" style="margin-top:8px">
          <input type="number" id="d2a-base" placeholder="หรือพิมพ์เอง เช่น 5" min="2" max="36" style="font-family:'Sarabun',sans-serif;font-size:1rem" oninput="clearBadges('d2a')">
        </div>
        <p class="note">* รองรับฐาน 2–36</p>
      </div>

      <button class="btn-convert" onclick="convertDec2Any()">✨ แปลง!</button>
      <div class="error-msg" id="d2a-err"></div>
    </div>

    <div class="result-box" id="d2a-result">
      <div class="result-answer" id="d2a-ans"></div>
      <div class="division-title">📝 วิธีทำ (หารสั้น)</div>
      <div class="division-steps" id="d2a-steps"></div>
      <div class="final-answer-line" id="d2a-final"></div>
    </div>
  </div>

  <!-- Panel 2: Any base to any base -->
  <div class="panel" id="panel-any2any">
    <div class="card">
      <div class="card-title">↔️ แปลงระหว่างฐานใดก็ได้</div>

      <div class="input-group">
        <label>ป้อนตัวเลข (ใช้ตัวอักษร A–Z สำหรับค่า 10–35)</label>
        <div class="b2b-row">
          <input type="text" id="b2b-input" placeholder="เช่น 1010, FF, 377" oninput="clearResult('b2b')" style="font-family:'Caveat',cursive;font-size:1.2rem;padding:12px 16px;border:2px solid #c5cae9;border-radius:12px;background:#f0f4ff;outline:none;color:#1a237e;">
          <span style="font-size:0.85rem;color:#888;white-space:nowrap">ฐาน</span>
          <select class="base-select" id="b2b-from">
            <option value="2">2 (Binary)</option>
            <option value="3">3</option><option value="4">4</option><option value="5">5</option>
            <option value="6">6</option><option value="7">7</option>
            <option value="8">8 (Octal)</option>
            <option value="9">9</option>
            <option value="10" selected>10 (Decimal)</option>
            <option value="11">11</option><option value="12">12</option><option value="13">13</option>
            <option value="14">14</option><option value="15">15</option>
            <option value="16">16 (Hex)</option>
            <option value="32">32</option><option value="36">36</option>
          </select>
        </div>
      </div>

      <div class="arrow-mid">↓ แปลงเป็น ↓</div>

      <div class="input-group">
        <label>ฐานปลายทาง</label>
        <div class="quick-bases" id="b2b-bases">
          <span class="base-badge bb-2"  onclick="pickBase('b2b',2)">ฐาน 2</span>
          <span class="base-badge bb-8"  onclick="pickBase('b2b',8)">ฐาน 8</span>
          <span class="base-badge bb-10" onclick="pickBase('b2b',10)">ฐาน 10</span>
          <span class="base-badge bb-16" onclick="pickBase('b2b',16)">ฐาน 16</span>
        </div>
        <div class="input-row" style="margin-top:8px">
          <input type="number" id="b2b-to" placeholder="หรือพิมพ์ฐาน เช่น 5" min="2" max="36" style="font-family:'Sarabun',sans-serif;font-size:1rem" oninput="clearBadges('b2b')">
        </div>
        <p class="note">* รองรับฐาน 2–36</p>
      </div>

      <button class="btn-convert" onclick="convertAny2Any()">✨ แปลง!</button>
      <div class="error-msg" id="b2b-err"></div>
    </div>

    <div class="result-box" id="b2b-result">
      <div class="result-answer" id="b2b-ans"></div>
      <div class="division-title">📝 วิธีทำ (ผ่านฐาน 10)</div>
      <div class="division-steps" id="b2b-steps"></div>
      <div class="final-answer-line" id="b2b-final"></div>
    </div>
  </div>

  <!-- Panel 3: All bases at once -->
  <div class="panel" id="panel-allbases">
    <div class="card">
      <div class="card-title">📋 แสดงเลขในทุกฐาน</div>

      <div class="input-group">
        <label>ป้อนตัวเลขและฐานต้นทาง</label>
        <div class="b2b-row">
          <input type="text" id="all-input" placeholder="เช่น 45017" oninput="clearResult('all')" style="font-family:'Caveat',cursive;font-size:1.2rem;padding:12px 16px;border:2px solid #c5cae9;border-radius:12px;background:#f0f4ff;outline:none;color:#1a237e;flex:2;">
          <span style="font-size:0.85rem;color:#888;white-space:nowrap">ฐาน</span>
          <select class="base-select" id="all-from">
            <option value="2">2</option><option value="3">3</option><option value="4">4</option>
            <option value="5">5</option><option value="6">6</option><option value="7">7</option>
            <option value="8">8</option><option value="9">9</option>
            <option value="10" selected>10</option>
            <option value="11">11</option><option value="12">12</option>
            <option value="16">16</option><option value="32">32</option><option value="36">36</option>
          </select>
        </div>
      </div>

      <button class="btn-convert" onclick="convertAllBases()">✨ แสดงทุกฐาน!</button>
      <div class="error-msg" id="all-err"></div>
    </div>

    <div class="result-box" id="all-result">
      <div class="result-answer" id="all-ans">ฐาน 10: <span id="all-dec"></span></div>
      <div class="all-bases-grid" id="all-grid"></div>
    </div>
  </div>

</div>

<script>
const DIGITS = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';

function toDecimal(str, base) {
  str = str.toUpperCase().trim();
  let val = 0;
  for (let c of str) {
    const d = DIGITS.indexOf(c);
    if (d < 0 || d >= base) return null;
    val = val * base + d;
  }
  return val;
}

function fromDecimal(n, base) {
  if (n === 0) return '0';
  let res = '';
  while (n > 0) { res = DIGITS[n % base] + res; n = Math.floor(n / base); }
  return res;
}

function getDivisionSteps(n, base) {
  // Returns array of {dividend, quotient, remainder}
  const steps = [];
  let cur = n;
  while (cur >= base) {
    const q = Math.floor(cur / base);
    const r = cur % base;
    steps.push({ dividend: cur, quotient: q, remainder: r });
    cur = q;
  }
  steps.push({ dividend: cur, quotient: 0, remainder: cur });
  return steps;
}

function renderDivisionSteps(steps, base, containerId, finalId, fromBase, toBase, origStr) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';

  steps.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'div-step';
    el.style.animationDelay = (i * 0.08) + 's';

    const remLabel = DIGITS[s.remainder];
    el.innerHTML = `
      <span class="divisor">${base}</span>
      <span class="bracket">)</span>
      <span class="dividend">${s.dividend}</span>
      <span class="quotient">${s.quotient === 0 && s.dividend < base ? '' : s.quotient}</span>
      <span class="rem-label">เศษ</span>
      <span class="rem-val">${remLabel}</span>
    `;
    c.appendChild(el);
  });

  // Build result from remainders bottom-up
  const rems = steps.map(s => DIGITS[s.remainder]);
  const result = rems.reverse().join('');

  const f = document.getElementById(finalId);
  f.innerHTML = `<span class="res-from">(${fromBase})</span>${origStr} = ${result}<span class="res-to">(${toBase})</span>`;
}

// Tab switching
function switchTab(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  event.target.classList.add('active');
}

// Badge selection
let selectedBase = { d2a: null, b2b: null };

function pickBase(panel, base) {
  selectedBase[panel] = base;
  const container = document.getElementById(panel + '-bases');
  container.querySelectorAll('.base-badge').forEach(b => b.classList.remove('sel'));
  event.target.classList.add('sel');
  if (panel === 'd2a') document.getElementById('d2a-base').value = '';
  else document.getElementById('b2b-to').value = '';
  clearResult(panel);
}

function clearBadges(panel) {
  selectedBase[panel] = null;
  const container = document.getElementById(panel + '-bases');
  if (container) container.querySelectorAll('.base-badge').forEach(b => b.classList.remove('sel'));
}

function clearResult(panel) {
  const r = document.getElementById(panel + '-result');
  if (r) r.classList.remove('show');
  const e = document.getElementById(panel + '-err');
  if (e) e.classList.remove('show');
}

function showError(panel, msg) {
  const e = document.getElementById(panel + '-err');
  e.textContent = msg;
  e.classList.add('show');
}

// Panel 1: Decimal → Any
function convertDec2Any() {
  const raw = document.getElementById('d2a-input').value.trim();
  const baseRaw = selectedBase['d2a'] || parseInt(document.getElementById('d2a-base').value);
  clearResult('d2a');

  if (!raw) return showError('d2a', '⚠️ กรุณาป้อนตัวเลข');
  if (!baseRaw || baseRaw < 2 || baseRaw > 36) return showError('d2a', '⚠️ กรุณาเลือกฐาน 2–36');

  const n = parseInt(raw, 10);
  if (isNaN(n) || n < 0) return showError('d2a', '⚠️ กรุณาป้อนจำนวนเต็มบวก (ฐาน 10)');
  if (n > 2147483647) return showError('d2a', '⚠️ ตัวเลขใหญ่เกินไป');

  if (n === 0) {
    const ans = document.getElementById('d2a-ans');
    ans.innerHTML = `<b>${raw}</b><sub>(10)</sub> = <span>0</span><sub>(${baseRaw})</sub>`;
    document.getElementById('d2a-steps').innerHTML = '<div class="div-step" style="animation:none;opacity:1">0 ÷ ' + baseRaw + ' = 0 เศษ 0</div>';
    document.getElementById('d2a-final').innerHTML = `<span class="res-from">(10)</span>0 = 0<span class="res-to">(${baseRaw})</span>`;
    document.getElementById('d2a-result').classList.add('show');
    return;
  }

  const result = fromDecimal(n, baseRaw);
  const steps = getDivisionSteps(n, baseRaw);

  const ans = document.getElementById('d2a-ans');
  ans.innerHTML = `<b>${raw}</b><sub>(10)</sub> = <span>${result}</span><sub>(${baseRaw})</sub>`;

  renderDivisionSteps(steps, baseRaw, 'd2a-steps', 'd2a-final', 10, baseRaw, raw);
  document.getElementById('d2a-result').classList.add('show');
}

// Panel 2: Any → Any
function convertAny2Any() {
  const raw = document.getElementById('b2b-input').value.trim();
  const fromBase = parseInt(document.getElementById('b2b-from').value);
  const toBaseRaw = selectedBase['b2b'] || parseInt(document.getElementById('b2b-to').value);
  clearResult('b2b');

  if (!raw) return showError('b2b', '⚠️ กรุณาป้อนตัวเลข');
  if (!toBaseRaw || toBaseRaw < 2 || toBaseRaw > 36) return showError('b2b', '⚠️ กรุณาเลือกฐานปลายทาง 2–36');

  const n = toDecimal(raw, fromBase);
  if (n === null) return showError('b2b', `⚠️ ตัวเลขไม่ถูกต้องสำหรับฐาน ${fromBase}`);
  if (n > 2147483647) return showError('b2b', '⚠️ ตัวเลขใหญ่เกินไป');

  const result = fromDecimal(n, toBaseRaw);

  const ans = document.getElementById('b2b-ans');
  ans.innerHTML = `<b>${raw.toUpperCase()}</b><sub>(${fromBase})</sub> = <span>${result}</span><sub>(${toBaseRaw})</sub>`;

  // Steps: first show decimal conversion, then division
  const stepsContainer = document.getElementById('b2b-steps');
  stepsContainer.innerHTML = '';

  if (fromBase !== 10) {
    // Step 1 note: convert to decimal
    const note = document.createElement('div');
    note.style.cssText = 'text-align:center;font-size:0.9rem;color:#7986cb;margin-bottom:8px;font-family:Sarabun,sans-serif;';
    note.textContent = `ขั้นที่ 1: แปลง ${raw.toUpperCase()}(${fromBase}) → ${n}(10)`;
    stepsContainer.appendChild(note);
    const note2 = document.createElement('div');
    note2.style.cssText = 'text-align:center;font-size:0.85rem;color:#999;margin-bottom:12px;font-family:Sarabun,sans-serif;';
    note2.textContent = `ขั้นที่ 2: หาร ${n} ด้วย ${toBaseRaw}`;
    stepsContainer.appendChild(note2);
  }

  if (n === 0) {
    const el = document.createElement('div');
    el.className = 'div-step'; el.style.opacity = '1';
    el.textContent = '0 → 0';
    stepsContainer.appendChild(el);
    document.getElementById('b2b-final').innerHTML = `<span class="res-from">(${fromBase})</span>${raw.toUpperCase()} = ${result}<span class="res-to">(${toBaseRaw})</span>`;
    document.getElementById('b2b-result').classList.add('show');
    return;
  }

  const steps = getDivisionSteps(n, toBaseRaw);
  steps.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'div-step';
    el.style.animationDelay = (i * 0.08) + 's';
    const remLabel = DIGITS[s.remainder];
    el.innerHTML = `
      <span class="divisor">${toBaseRaw}</span>
      <span class="bracket">)</span>
      <span class="dividend">${s.dividend}</span>
      <span class="quotient">${s.quotient === 0 && s.dividend < toBaseRaw ? '' : s.quotient}</span>
      <span class="rem-label">เศษ</span>
      <span class="rem-val">${remLabel}</span>
    `;
    stepsContainer.appendChild(el);
  });

  const rems = steps.map(s => DIGITS[s.remainder]);
  const finalRes = rems.reverse().join('');
  document.getElementById('b2b-final').innerHTML = `<span class="res-from">(${fromBase})</span>${raw.toUpperCase()} = ${finalRes}<span class="res-to">(${toBaseRaw})</span>`;
  document.getElementById('b2b-result').classList.add('show');
}

// Panel 3: All bases
function convertAllBases() {
  const raw = document.getElementById('all-input').value.trim();
  const fromBase = parseInt(document.getElementById('all-from').value);
  clearResult('all');

  if (!raw) return showError('all', '⚠️ กรุณาป้อนตัวเลข');

  const n = toDecimal(raw, fromBase);
  if (n === null) return showError('all', `⚠️ ตัวเลขไม่ถูกต้องสำหรับฐาน ${fromBase}`);
  if (n > 9007199254740991) return showError('all', '⚠️ ตัวเลขใหญ่เกินไป');

  document.getElementById('all-dec').textContent = n;
  document.getElementById('all-ans').innerHTML = `ฐาน 10: <span>${n}</span>`;

  const bases = [
    {b:2,label:'ฐาน 2 (Binary)',color:'#e91e8c'},
    {b:3,label:'ฐาน 3',color:'#9c27b0'},
    {b:4,label:'ฐาน 4',color:'#673ab7'},
    {b:5,label:'ฐาน 5',color:'#3f51b5'},
    {b:6,label:'ฐาน 6',color:'#2196f3'},
    {b:7,label:'ฐาน 7',color:'#00bcd4'},
    {b:8,label:'ฐาน 8 (Octal)',color:'#009688'},
    {b:9,label:'ฐาน 9',color:'#4caf50'},
    {b:10,label:'ฐาน 10 (Decimal)',color:'#8bc34a'},
    {b:11,label:'ฐาน 11',color:'#cddc39'},
    {b:12,label:'ฐาน 12',color:'#ffc107'},
    {b:16,label:'ฐาน 16 (Hex)',color:'#ff5722'},
    {b:32,label:'ฐาน 32',color:'#795548'},
    {b:36,label:'ฐาน 36',color:'#607d8b'},
  ];

  const grid = document.getElementById('all-grid');
  grid.innerHTML = '';
  bases.forEach((item, i) => {
    const val = fromDecimal(n, item.b);
    const chip = document.createElement('div');
    chip.className = 'base-chip';
    chip.style.animationDelay = (i * 0.05) + 's';
    chip.style.borderColor = item.color + '55';
    chip.innerHTML = `<div class="bc-label" style="color:${item.color}">${item.label}</div><div class="bc-val">${val}</div>`;
    grid.appendChild(chip);
  });

  document.getElementById('all-result').classList.add('show');
}

// Enter key support
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  const active = document.querySelector('.panel.active');
  if (!active) return;
  if (active.id === 'panel-dec2any') convertDec2Any();
  else if (active.id === 'panel-any2any') convertAny2Any();
  else if (active.id === 'panel-allbases') convertAllBases();
});
</script>
</body>
</html>
